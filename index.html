<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullarc Studio</title>
    <style>
        :root { --bg: #0b0f19; --text: #f3f4f6; --accent: #10b981; --muted: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; padding: 4rem 2rem; line-height: 1.6; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
        p { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
        .btn { display: inline-block; background: var(--accent); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        footer { margin-top: 4rem; border-top: 1px solid #1e293b; padding-top: 2rem; font-size: 0.9rem; }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--accent); }
    </style>
</head>
